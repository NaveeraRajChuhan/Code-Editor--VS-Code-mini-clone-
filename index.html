<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus IDE | Pro Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="editor-shell">
        <nav class="side-bar">
            <div class="nav-icon active">JS</div>
            <div class="nav-icon">HTML</div>
            <div class="nav-icon">CSS</div>
        </nav>

        <div class="main-body">
            <header class="editor-header">
                <div class="file-info">
                    <span class="file-dot"></span>
                    <span class="file-name">main.js — Nexus IDE</span>
                </div>
                <div class="actions">
                    <button class="btn-run" onclick="runCode()">
                        <span class="play-icon">▶</span> Run
                    </button>
                    <button class="btn-save" onclick="saveFile()">Save</button>
                </div>
            </header>

            <div class="editor-core">
                <div class="line-numbers" id="line-numbers">
                    <div>1</div>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="editor" spellcheck="false" oninput="handleInput()" onscroll="handleScroll()" onkeydown="handleTab(event)"></textarea>
                    <pre id="highlighting" aria-hidden="true"><code id="highlighting-content"></code></pre>
                </div>
            </div>

            <footer class="terminal">
                <div class="terminal-header">
                    <span>TERMINAL</span>
                    <button onclick="clearTerminal()">Clear</button>
                </div>
                <div id="output" class="terminal-body">
                    <span class="prompt">>></span> Ready to compile...
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
